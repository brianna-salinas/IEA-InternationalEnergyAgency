<mat-button-toggle-group
  [value]="currentLang"
  appearance="standard"
  aria-label="Preferred Language"
  name="language"
>
  @for (language of languages; track language) {
    <mat-button-toggle
      (click)="useLanguage(language)"
      [value]="language"
      [attr.aria-label]="language === 'en' ? 'English' : 'Español'"
    >
      {{ language.toUpperCase() }}
    </mat-button-toggle>
  }
</mat-button-toggle-group>
